<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 — 팅크웨어 챗봇</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Noto Sans KR -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Admin CSS -->
  <link rel="stylesheet" href="css/admin.css">

  <style>
    /* ── 로그인 전용 스타일 ── */
    body.login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg-page);
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    /* 데코 배경 도형 */
    .login-bg-deco {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(24,144,255,0.12), rgba(24,144,255,0.04));
      border: 1px solid rgba(24,144,255,0.08);
    }
    .deco-circle.c1 { width: 380px; height: 380px; top: -80px; left: -100px; }
    .deco-circle.c2 { width: 200px; height: 200px; top: 60px;  left: 80px;  opacity: 0.5; }
    .deco-circle.c3 { width: 500px; height: 500px; bottom: -150px; right: -120px; }
    .deco-circle.c4 { width: 140px; height: 140px; bottom: 40px; right: 200px; opacity: 0.4; }
    .deco-line {
      position: absolute;
      background: rgba(24,144,255,0.1);
      transform-origin: 0 0;
    }
    .deco-line.l1 {
      width: 300px; height: 1px;
      top: 220px; left: 100px;
      transform: rotate(-15deg);
    }
    .deco-line.l2 {
      width: 400px; height: 1px;
      bottom: 200px; right: 80px;
      transform: rotate(10deg);
    }
    .deco-dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(24,144,255,0.25);
    }
    .deco-dot.d1 { width: 8px; height: 8px; top: 180px; left: 230px; }
    .deco-dot.d2 { width: 5px; height: 5px; top: 320px; left: 160px; }
    .deco-dot.d3 { width: 6px; height: 6px; bottom: 250px; right: 300px; }
    .deco-dot.d4 { width: 10px; height: 10px; top: 120px; right: 250px; }

    /* 로그인 카드 */
    .login-card {
      position: relative;
      z-index: 1;
      width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* 로고 */
    .login-logo {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .login-logo-img {
      display: block;
      width: 284px;
      height: 28px;
      object-fit: contain;
    }
    .login-logo-icon {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }
    .login-logo-text {
      font-size: 24px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--color-text-sub);
      margin-bottom: 32px;
      text-align: center;
    }

    /* 폼 영역 */
    .login-form-wrap {
      width: 100%;
      background: white;
      border-radius: 8px;
      padding: 32px 36px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    .login-form-title {
      font-size: 24px;
      line-height: 32px;
      font-weight: 500;
      color: var(--color-text-main);
      margin-bottom: 28px;
    }

    .login-form { display: flex; flex-direction: column; gap: 20px; }

    .login-input-group {
      position: relative;
    }
    .login-input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-disabled);
      font-size: 16px;
      z-index: 1;
    }
    .login-input {
      width: 100%;
      height: 44px;
      padding: 8px 12px 8px 38px;
      font-size: 14px;
      font-family: var(--font-family);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-base);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
      color: var(--color-text-main);
    }
    .login-input::placeholder { color: var(--color-text-disabled); }
    .login-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }
    .login-input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 2px rgba(255,77,79,0.2);
    }
    .login-error-msg {
      font-size: 12px;
      color: var(--color-error);
      margin-top: 4px;
      display: none;
    }
    .login-error-msg.show { display: block; }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .login-remember {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--color-text-main);
    }
    .login-remember input[type="checkbox"] {
      accent-color: var(--color-primary);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .login-forgot {
      color: var(--color-primary);
      cursor: pointer;
      font-size: 13px;
    }
    .login-forgot:hover { color: var(--color-primary-dark); }

    .btn-login {
      width: 100%;
      height: 44px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-base);
      font-size: 15px;
      font-family: var(--font-family);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: var(--shadow-btn);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }
    .btn-login:hover  { background: var(--color-primary-dark); }
    .btn-login:active { background: #0050B3; }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

    /* 하단 푸터 */
    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: var(--color-text-sub);
    }
    .login-footer a {
      color: var(--color-text-sub);
      margin: 0 12px;
    }
    .login-footer a:hover { color: var(--color-text-main); }

    /* 로딩 상태 */
    .btn-login .spinner {
      width: 16px;
      height: 16px;
      border-width: 2px;
    }
  </style>
</head>
<body class="login-page">

  <!-- 배경 데코 -->
  <div class="login-bg-deco">
    <div class="deco-circle c1"></div>
    <div class="deco-circle c2"></div>
    <div class="deco-circle c3"></div>
    <div class="deco-circle c4"></div>
    <div class="deco-line l1"></div>
    <div class="deco-line l2"></div>
    <div class="deco-dot d1"></div>
    <div class="deco-dot d2"></div>
    <div class="deco-dot d3"></div>
    <div class="deco-dot d4"></div>
  </div>

  <!-- 로그인 카드 -->
  <div class="login-card">
    <!-- 로고 -->
    <div class="login-logo">
      <img src="image/logo-thinkware-ai-chat.png" alt="THINKWARE" class="login-logo-img">
    </div>
    <div class="login-subtitle">챗봇 시스템 관리자 포털</div>

    <!-- 폼 카드 -->
    <div class="login-form-wrap">
      <!-- 타이틀 -->
      <h3 class="login-form-title">관리자 로그인</h3>

      <!-- 입력 폼 -->
      <form class="login-form" id="loginForm" novalidate>
        <!-- 아이디 -->
        <div>
          <div class="login-input-group">
            <i class="bi bi-person login-input-icon"></i>
            <input
              type="text"
              id="inputId"
              class="login-input"
              placeholder="관리자 아이디를 입력하세요"
              autocomplete="username"
            >
          </div>
          <div class="login-error-msg" id="errId">아이디를 입력해 주세요.</div>
        </div>

        <!-- 비밀번호 -->
        <div>
          <div class="login-input-group">
            <i class="bi bi-lock login-input-icon"></i>
            <input
              type="password"
              id="inputPw"
              class="login-input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            >
            <button type="button" id="togglePw"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-sub);padding:4px;font-size:16px;">
              <i class="bi bi-eye-slash" id="eyeIcon"></i>
            </button>
          </div>
          <div class="login-error-msg" id="errPw">비밀번호를 입력해 주세요.</div>
        </div>

        <!-- 옵션 -->
        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" id="rememberMe"> 로그인 상태 유지
          </label>
          <span class="login-forgot" id="forgotLink">비밀번호 찾기</span>
        </div>

        <!-- 로그인 버튼 -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginBtnText">로그인</span>
        </button>
      </form>
    </div>

    <!-- 푸터 -->
    <div class="login-footer">
      <a href="#">이용약관</a>
      <a href="#">개인정보처리방침</a>
      <a href="#">고객센터</a>
      <div style="margin-top:12px;">© 2026 Thinkware Corporation. All rights reserved.</div>
    </div>
  </div>

  <!-- 비밀번호 찾기 모달 -->
  <div class="modal-overlay" id="modalForgot">
    <div class="modal-box" style="width:420px;">
      <div class="modal-header">
        <span>비밀번호 찾기</span>
        <button class="modal-close" data-modal-close="modalForgot">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--color-text-sub);font-size:14px;margin-bottom:20px;">
          가입 시 등록한 이메일로 비밀번호 재설정 링크를 발송합니다.
        </p>
        <div class="login-input-group" style="position:relative;">
          <i class="bi bi-envelope login-input-icon"></i>
          <input type="email" class="login-input" placeholder="등록 이메일 주소 입력" style="height:40px;padding-left:38px;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-default btn-sm" data-modal-close="modalForgot">취소</button>
        <button class="btn-primary btn-sm" onclick="AdminToast.show('비밀번호 재설정 이메일을 발송했습니다.'); AdminModal.close('modalForgot');">발송</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Admin JS -->
  <script src="js/admin.js"></script>

  <script>
    /* ── 비밀번호 표시/숨김 ── */
    document.getElementById('togglePw').addEventListener('click', function() {
      const input = document.getElementById('inputPw');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-slash';
      }
    });

    /* ── 비밀번호 찾기 ── */
    document.getElementById('forgotLink').addEventListener('click', () => {
      AdminModal.open('modalForgot');
    });

    /* ── 로그인 처리 ── */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('inputId').value.trim();
      const pw = document.getElementById('inputPw').value.trim();
      let valid = true;

      // 유효성 검사
      if (!id) {
        document.getElementById('inputId').classList.add('error');
        document.getElementById('errId').classList.add('show');
        valid = false;
      } else {
        document.getElementById('inputId').classList.remove('error');
        document.getElementById('errId').classList.remove('show');
      }
      if (!pw) {
        document.getElementById('inputPw').classList.add('error');
        document.getElementById('errPw').classList.add('show');
        valid = false;
      } else {
        document.getElementById('inputPw').classList.remove('error');
        document.getElementById('errPw').classList.remove('show');
      }

      if (!valid) return;

      // 로딩 상태
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> 로그인 중...';

      // 더미 인증 (1.2초 후 이동)
      setTimeout(() => {
        if (id === 'admin' && pw === 'admin123') {
          window.location.href = 'index.html';
        } else {
          btn.disabled = false;
          btnText.textContent = '로그인';
          document.getElementById('inputId').classList.add('error');
          document.getElementById('inputPw').classList.add('error');
          document.getElementById('errId').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
          document.getElementById('errId').classList.add('show');
          document.getElementById('errPw').classList.remove('show');
          AdminToast.show('아이디 또는 비밀번호를 확인해 주세요.', 'error');
        }
      }, 1200);
    });

    /* ── 입력 시 에러 초기화 ── */
    ['inputId','inputPw'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById(id === 'inputId' ? 'errId' : 'errPw').classList.remove('show');
      });
    });
  </script>
</body>
</html>
